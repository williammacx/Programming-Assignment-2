<!DOCTYPE html>
<html>
<head>
  <title>Quote Generator</title>
</head>
<body>

<button id="quoteBtn">Click me to get a famous quote</button>
<p id="quoteText"></p>

<script>
  const quote = [
    "A happy man is too satisfied with the present to think too much about the future. - Albert Einstein",
    "I don't care that they stole my idea. I care that they don't have any of their own. - Nikola Tesla",
    "He will win who knows when to fight and when not to fight. - Sun Tzu",
    "Do not take life too seriously. You will never get out of it alive. - Elbert Hubbard"
    "It is far better to live like a tiger for a day than to live like a jackal for a hundred years. - Tipu Sultan"
    "My grandfather rode a camel, my father rode a camel, I drive a Mercedes, my son drives a Land Rover, his son will drive a Land Rover, but his son will ride a camel. - Rashid bin Saeed Al Maktoum"
    "Life isn't divided into genres. It's a horrifying, romantic, tragic, comical, science-fiction cowboy detective novel. - Alan Moore"
    "The only thing that made me, or any of us, special was that no one in the whole of history would ever see the universe exactly the same way any other of us saw it. - Grant Morrison"
    "Technology is a useful servant but a dangerous master. - Christian Lous Lange"
    "Associate yourself with men of good quality if you esteem your own reputation; for 'tis better to be alone than in bad company. - George Washington"
    ];

  const btn = document.getElementById("quoteBtn");
  const text = document.getElementById("quoteText");

  btn.addEventListener("click", () => {
    const index = Math.floor(Math.random() * quote.length);
    text.textContent = quote[index];
  });
  
</script>
</body>  
</html>
